  :root{

    font-family:var(--ff-text); -webkit-font-smoothing:antialiased;

    text-align:center; gap:var(--space-md); padding:var(--edge);
  }
  h1{ font-family:var(--ff-display); font-weight:300; letter-spacing:0.34em; text-indent:0.34em;
      font-size:clamp(2.2rem, 10vw, 3.6rem); margin:0; line-height:1; }
  p{ font-family:var(--ff-text); font-style:italic; font-weight:300; color:var(--ink-soft);

  a{ font-family:var(--ff-display); font-size:0.74rem; letter-spacing:0.2em; text-transform:uppercase;
